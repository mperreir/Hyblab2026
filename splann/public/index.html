<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Splann! — Menu</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0d0d0d;
    --white: #f5f3ef;
    --red: #e8292e;
    --gray: #2a2a2a;
    --border: rgba(255,255,255,0.1);
  }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Albert Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 430px;
    margin: 0 auto;
  }

  /* ── NAV TOP ── */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    height: 36px;
    object-fit: contain;
  }

  .top-icons {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .top-icons button {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--white);
    display: flex;
    align-items: center;
    padding: 4px;
    transition: opacity 0.2s;
  }

  .top-icons button:hover { opacity: 0.6; }

  /* ── MENU ITEMS ── */
  .menu-list {
    flex: 1;
    list-style: none;
    padding: 8px 0;
  }

  .menu-item {
    border-bottom: 1px solid var(--border);
  }

  .menu-item a,
  .menu-item button {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 18px 24px;
    background: none;
    border: none;
    color: var(--white);
    font-family: 'Albert Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.2s;
  }

  .menu-item a:hover,
  .menu-item button:hover {
    background: rgba(255,255,255,0.05);
  }

  .menu-item.active > button,
  .menu-item.active > a {
    color: var(--red);
  }

  .chevron {
    transition: transform 0.3s ease;
    flex-shrink: 0;
  }

  .menu-item.open .chevron {
    transform: rotate(180deg);
  }

  /* ── SOUS-MENU ── */
  .submenu {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease;
    background: var(--gray);
  }

  .menu-item.open .submenu {
    max-height: 300px;
  }

  .submenu a {
    display: block;
    padding: 14px 24px 14px 36px;
    color: rgba(255,255,255,0.7);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 400;
    letter-spacing: 0.04em;
    text-transform: none;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    transition: color 0.2s, padding-left 0.2s;
  }

  .submenu a:last-child { border-bottom: none; }

  .submenu a:hover {
    color: var(--white);
    padding-left: 44px;
  }

  /* ── INFOLETTRE ── */
  .menu-item--plain a {
    justify-content: flex-start;
    gap: 0;
  }

  /* ── BOUTON DON ── */
  .btn-don {
    margin: 20px 24px;
    display: block;
    text-align: center;
    background: var(--red);
    color: var(--white);
    font-family: 'Albert Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    padding: 16px;
    border-radius: 4px;
    transition: background 0.2s, transform 0.15s;
  }

  .btn-don:hover {
    background: #c8222a;
    transform: translateY(-1px);
  }

  /* ── TOGGLE LANGUE ── */
  .lang-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px 24px 32px;
  }

  .lang-flag {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--border);
  }

  .toggle-switch {
    width: 44px;
    height: 24px;
    background: var(--gray);
    border-radius: 12px;
    position: relative;
    cursor: pointer;
    border: 1px solid var(--border);
    transition: background 0.2s;
  }

  .toggle-switch::after {
    content: '';
    position: absolute;
    width: 18px;
    height: 18px;
    background: var(--white);
    border-radius: 50%;
    top: 2px;
    left: 2px;
    transition: transform 0.2s;
  }

  .toggle-switch.bzh {
    background: #1a3a5c;
  }

  .toggle-switch.bzh::after {
    transform: translateX(20px);
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <img src="img/Splann! Logo.png" alt="Splann!" class="logo"
       onerror="this.style.display='none'; this.insertAdjacentHTML('afterend','<span style=\'font-size:1.4rem;font-weight:800;color:#f5f3ef;\'>splann<span style=\'color:#e8292e;\'>!</span></span>')">
  <div class="top-icons">
    <button aria-label="Rechercher">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </button>
    <button aria-label="Fermer" onclick="window.history.back()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
</div>

<!-- MENU -->
<ul class="menu-list">

  <!-- ENQUÊTES -->
  <li class="menu-item" id="item-enquetes">
    <button onclick="toggleItem('item-enquetes')" aria-expanded="false">
      Enquêtes
      <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </button>
    <div class="submenu">
      <a href="#">Toutes les enquêtes</a>
      <a href="#">Environnement</a>
      <a href="#">Social</a>
      <a href="#">Politique</a>
    </div>
  </li>

  <!-- EXSPLANN! → redirige vers une autre page -->
  <li class="menu-item" id="item-exsplann">
    <a href="accueil.html">
      ExSplann!
      <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </a>
  </li>

  <!-- ACTUALITÉS -->
  <li class="menu-item" id="item-actu">
    <button onclick="toggleItem('item-actu')" aria-expanded="false">
      Actualités
      <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </button>
    <div class="submenu">
      <a href="#">Dernières nouvelles</a>
      <a href="#">Communiqués</a>
    </div>
  </li>

  <!-- VIDÉOS -->
  <li class="menu-item" id="item-videos">
    <button onclick="toggleItem('item-videos')" aria-expanded="false">
      Vidéos
      <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </button>
    <div class="submenu">
      <a href="#">Documentaires</a>
      <a href="#">Reportages</a>
    </div>
  </li>

  <!-- À PROPOS -->
  <li class="menu-item" id="item-apropos">
    <button onclick="toggleItem('item-apropos')" aria-expanded="false">
      À propos
      <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </button>
    <div class="submenu">
      <a href="#">Qui sommes-nous ?</a>
      <a href="#">Notre équipe</a>
      <a href="#">Mentions légales</a>
    </div>
  </li>

  <!-- INFOLETTRE -->
  <li class="menu-item menu-item--plain">
    <a href="#">Infolettre</a>
  </li>

</ul>

<!-- BOUTON DON -->
<a href="#" class="btn-don">Faire un don</a>

<!-- TOGGLE LANGUE -->
<div class="lang-toggle">
  <img src="img/Drp_Français.jpg" alt="FR" class="lang-flag"
       onerror="this.style.display='none'">
  <div class="toggle-switch" id="langToggle" onclick="toggleLang(this)" title="Changer de langue"></div>
  <img src="img/Drp_breton.png" alt="BZH" class="lang-flag"
       onerror="this.style.display='none'">
</div>

<script>
  function toggleItem(id) {
    const item = document.getElementById(id);
    const isOpen = item.classList.contains('open');
    // Ferme tous les items ouverts
    document.querySelectorAll('.menu-item.open').forEach(el => {
      el.classList.remove('open');
      const btn = el.querySelector('button');
      if (btn) btn.setAttribute('aria-expanded', 'false');
    });
    // Ouvre celui-ci si ce n'était pas déjà ouvert
    if (!isOpen) {
      item.classList.add('open');
      const btn = item.querySelector('button');
      if (btn) btn.setAttribute('aria-expanded', 'true');
    }
  }

  function toggleLang(el) {
    el.classList.toggle('bzh');
  }
</script>

</body>
</html>
