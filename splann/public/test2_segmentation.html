<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splann - Navigation Hiérarchique</title>
    
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css">
    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>

    <style>
        /* VARIABLES COULEURS  */
        :root {
            --color-vif: #FF5262;
            --color-clair: #FFC9CE;
            --color-surlignage: #FD707D;
            --bg-white: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: #f5f5f5;
        }

        /* Conteneur du swiper   */
        #mySwiper {
            width: 100vw;
            height: 100vh;
        }

        .swiper-slide {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            background: var(--bg-white);
        }

        /* Barre de navigation*/
        .nav-bar-hierarchical {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            align-items: center;
            z-index: 1000;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50px;
            backdrop-filter: blur(5px);
        }

        /* Le Volet */
        .volet {
            height: 20px;
            min-width: 50px;
            border: 2px solid var(--color-vif);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* État : Déjà parcouru */
        .volet.parcouru {
            background-color: var(--color-clair);
            border-color: var(--color-clair);
        }

        /* État : Actif */
        .volet.active {
            border: none;
            min-width: auto;
            background: transparent;
            gap: 8px; 
        }

        /* Points inter-volet*/
        .inner-dot {
            width: 12px;
            height: 12px;
            background-color: #ddd;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        /* Point coloré dans le volet actif */
        .inner-dot.active {
            background-color: var(--color-vif);
        }

        /* Le triangle pour la dernière slide de chaque volet */
        .inner-dot.is-last {
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            border-radius: 0;
            width: 14px;
            height: 14px;
            transform: rotate(180deg);
            background-color: var(--color-clair);
        }

        .inner-dot.is-last.active {
            background-color: var(--color-vif);
        }

        /* Titres pour le test */
        h1 { font-size: 1.5rem; color: #333; }
    </style>
</head>
<body>

    <div id="mySwiper" class="swiper">
        <div class="swiper-wrapper">
            <section class="swiper-slide"><h1>Slide Titre</h1></section>
            
            <section class="swiper-slide"><h1>Enquête - Page 1</h1></section>
            <section class="swiper-slide"><h1>Enquête - Page 2</h1></section>
            <section class="swiper-slide"><h1>Enquête - Page 3</h1></section>
            
            <section class="swiper-slide"><h1>Analyse - Page A</h1></section>
            <section class="swiper-slide"><h1>Analyse - Page B</h1></section>

            <section class="swiper-slide"><h1>Fin / Crédits</h1></section>
        </div>
    </div>

    <div class="nav-bar-hierarchical" id="navBar"></div>

    <script>
        // Configuration des volets (slides: nombre de pages dans ce chapitre.)
        const voletsData = [
            { id: "titre", slides: 1 },
            { id: "enquete", slides: 3 },
            { id: "analyse", slides: 2 },
            { id: "credits", slides: 1 }
        ];

        // Initialisation de Swiper
        const swiper = new Swiper('#mySwiper', {
            direction: 'horizontal',
            loop: false,
            speed: 600,
            mousewheel: true,
        });

        const navContainer = document.getElementById('navBar');

        // Recréée la barre à chaque changement de slide  
        function updateHierarchicalNav() {
            navContainer.innerHTML = ''; // On vide 
            const currentGlobalIndex = swiper.activeIndex;
            
            let cumulativeSlides = 0; // Compteur pour savoir où chaque volet commence

            voletsData.forEach((volet, vIndex) => {
                // Création de l'ovale
                const voletDiv = document.createElement('div');
                voletDiv.classList.add('volet');

                // Plage d'index pour ce volet
                const startRange = cumulativeSlides;
                const endRange = cumulativeSlides + volet.slides - 1;
                
                // VOLET DÉJÀ PARCOURU (Index actuel est après ce volet)
                if (currentGlobalIndex > endRange) {
                    voletDiv.classList.add('parcouru');
                } 
                
                // VOLET ACTIF (L'index est à l'intérieur de ce volet)
                else if (currentGlobalIndex >= startRange && currentGlobalIndex <= endRange) {
                    voletDiv.classList.add('active');
                    
                    // On génère les points internes
                    for (let i = 0; i < volet.slides; i++) {
                        const dot = document.createElement('div');
                        dot.classList.add('inner-dot');
                        
                        // Allumer le point si on l'a passé ou si on est dessus
                        if (startRange + i <= currentGlobalIndex) {
                            dot.classList.add('active');
                        }
                        
                        // Si c'est le dernier point du volet, c'est un triangle
                        if (i === volet.slides - 1) {
                            dot.classList.add('is-last');
                        }
                        
                        voletDiv.appendChild(dot);
                    }
                }

                // Navigation au clic sur le volet
                voletDiv.onclick = () => swiper.slideTo(startRange);
                navContainer.appendChild(voletDiv);

                // On incrémente le compteur pour le prochain volet
                cumulativeSlides += volet.slides;
            });
        }

        // Écouteur de changement de slide
        swiper.on('slideChange', updateHierarchicalNav);

        // Premier rendu
        updateHierarchicalNav();
    </script>
</body>
</html>
