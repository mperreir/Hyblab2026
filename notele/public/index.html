<!DOCTYPE html>

<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1">
  <title>Hyblab 2025</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/scrollable.css">
  <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/loadingio/loading.css@v2.0.0/dist/loading.css" >
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
  <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
  <script src="js/createEntreprise.js" defer></script>
  <script src="js/pinPosition.js" defer></script>
  <script src="js/appearances.js" defer></script>
  <script src="js/selecteur.js" defer></script>
  <script src="js/filters.js" defer></script>
  <script src="js/scrollable.js" defer></script>



</head>
<body>
<header>
  <img alt="logo LabelEco" src="img/logo_noir.svg" id="logo">
  <nav id="filters">
    <div class="selector-wrapper">
      <button class="selector" onclick="toggleDropdown('tailleDropdown', this)">
        Taille de l'entreprise
        <img alt="drop Icon" src="img/fleche_filtres.svg">
      </button>
      <div class="dropdown" id="tailleDropdown">
        <label onclick="filter(event)"><input type="checkbox" value="Independant"> Indépendant</label>
        <label onclick="filter(event)"><input type="checkbox" value="PME"> PME</label>
        <label onclick="filter(event)"><input type="checkbox" value="Grande"> Grande entreprise</label>
      </div>
    </div>

    <div class="selector-wrapper">
      <button class="selector" onclick="toggleDropdown('secteurDropdown', this)">
        Secteurs
        <img alt="drop Icon" src="img/fleche_filtres.svg">
      </button>
      <div class="dropdown" id="secteurDropdown">
        <label onclick="filter(event)"><img src="img/pin_alimentaire.svg"></img><input type="checkbox" value="Alimentaire"> Food & gastronomie</label>
        <label onclick="filter(event)"><img src="img/pin_tech.svg"><input type="checkbox" value="Tech"> Tech & innovation</label>
        <label onclick="filter(event)"><img src="img/pin_industrie.svg"><input type="checkbox" value="Industrie"> Industrie & production</label>
        <label onclick="filter(event)"><img src="img/pin_commerce.svg"><input type="checkbox" value="Commerce"> Commerces & services</label>
        <label onclick="filter(event)"><img src="img/pin_agriculture.svg"><input type="checkbox" value="Agriculture"> Agriculture & artisanat</label>
        <label onclick="filter(event)"><img src="img/pin_art.svg"><input type="checkbox" value="Art"> Créatif & culture</label>
        <label onclick="filter(event)"><img src="img/pin_sante.svg"><input type="checkbox" value="Sante"> Santé & bien-être</label>
      </div>
    </div>
  </nav>
</header>
<main>
  <div id="mapWrapper">
    <img src="img/map.svg" alt="carte wallonie picarde" id="regionMap">
    <div id="pinLayer">
      <div class="villePin Pin" id="V1">
        <p>&#9679;</p>
        <p>Comines</p>
      </div>
      <div class="villePin Pin" id="V2">
        <p>&#9679;</p>
        <p>Mouscron</p>
      </div>
      <div class="villePin Pin" id="V3">
        <p>&#9679;</p>
        <p>Tournai</p>
      </div>
      <div class="villePin Pin" id="V4">
        <p>&#9679;</p>
        <p>Peruwiez</p>
      </div>
      <div class="villePin Pin" id="V5">
        <p>&#9679;</p>
        <p>Lessines</p>
      </div>
      <div class="villePin Pin" id="V6">
        <p>&#9679;</p>
        <p>Ath</p>
      </div>
      <div class="villePin Pin" id="V7">
        <p>&#9679;</p>
        <p>Enghien</p>
      </div>
    </div>
  </div>
  <aside id="title">Explore autrement le tissu entreprenarial de ta région !</aside>
  <nav id="GenZ_filters">
    <button onclick="filter(event)" id="B1">Plot twist</button>
    <button onclick="filter(event)" id="B2">Affaire de famille</button>
    <button onclick="filter(event)" id="B3">Boss ladies<span class="ruban">🎀</span></button>
    <button onclick="filter(event)" id="B4">Surprise me</button>
    <button onclick="filter(event)" id="B5">Jobs pas comme les autres</button>
  </nav>
  <button onclick="displayScroll()">scrollabl</button>
</main>
<aside id="scrollable_page">

</aside>
</body>
</html>
