<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Descente</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 900vh;
      background: #000;
      overflow-x: hidden;
    }

    .scene {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    /* ── Calques de fond ────────────────────────────────── */
    .calque-ciel {
      position: absolute;
      inset: 0;
      background-image: url('img/plan_03_ciel.png');
      background-size: cover;
      background-position: center center;
      will-change: transform;
    }

    .calque-ville {
      position: absolute;
      inset: 0;
      overflow: visible; /* laisse dépasser l'image */
      transform: translateY(100%);
      will-change: transform;
    }

    .calque-ville img {
      position: absolute;
      bottom: 0;
      left: -50%;        
      height: 100%;   /* hauteur = hauteur de l'écran */
      width: auto;    /* largeur naturelle, pas de crop */
    }

    /* ── Groupe scène 1 : part vers la droite ───────────── */
    .groupe-scene1 {
      position: absolute;
      inset: 0;
      overflow: visible;
      will-change: transform;
    }

    /* ── Base commune aux 3 images ──────────────────────── */
    .musee, .ruines, .ecolier {
      position: absolute;
      opacity: 0;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .musee {
      bottom: -20px;
      right: 0px;
      width: 300px;
      transform: translateY(60px);
    }

    .ruines {
      bottom: 0;
      left: 0px;
      width: 400px;
      transform: translateY(60px);
    }

    .ecolier {
      bottom: 0;
      left: 50%;
      width: 260px;
      transform: translateX(-50%) translateY(60px);
    }

    .musee.visible   { opacity: 1; transform: translateY(0); }
    .ruines.visible  { opacity: 1; transform: translateY(0); }
    .ecolier.visible { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Texte par dessus tout ──────────────────────────── */
    .bloc-texte-musee {
      position: absolute;
      top: 20%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      opacity: 0;
      transition: opacity 0.8s ease;
      pointer-events: none;
      max-width: 560px;
      padding: 0 24px;
      z-index: 100;
    }

    .bloc-texte-musee.visible { opacity: 1; pointer-events: all; }

    .bloc-texte-musee .titre {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 2.4rem;
      font-weight: 300;
      color: #f97316;
      letter-spacing: 0.1em;
      text-shadow: 0 2px 16px rgba(0,0,0,0.8);
      margin-bottom: 16px;
    }

    .bloc-texte-musee .description {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.15rem;
      font-weight: 300;
      font-style: italic;
      color: rgba(255,255,255,0.92);
      line-height: 1.75;
      text-shadow: 0 2px 10px rgba(0,0,0,0.9);
    }

    .bloc-texte-musee a.button {
      pointer-events: all;
      z-index: 10;
      display: inline-block;
      margin-top: 12px;
      padding: 4px 12px;
      border: 1px outset;
      border-radius: 3px;
      color: orange;
      background-color: white;
      text-decoration: none;
    }

    /* ── Scène 2 : arrive depuis la gauche ──────────────── */
    .scene2 {
      position: absolute;
      top: 0;
      left: -100%; /* commence hors écran à gauche */
      width: 100%;
      height: 100%;
      background-image: url('img/chantier/avant.png');
      background-size: cover;
      background-position: center;
      will-change: transform;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .scene2-contenu {
      text-align: center;
      color: white;
      font-family: 'Cormorant Garamond', serif;
      opacity: 0;
      transition: opacity 0.8s ease;
      padding: 24px;
    }

    .scene2-contenu.visible { opacity: 1; }

    .scene2-contenu .titre {
      font-size: 2.4rem;
      font-weight: 300;
      color: #f97316;
      margin-bottom: 16px;
    }

    .scene2-contenu .description {
      font-size: 1.1rem;
      font-style: italic;
      line-height: 1.75;
    }

    /* ── Arbre entre les deux scènes ────────────────────── */
    /* Centré sur la jointure, z-index élevé pour cacher les bords */
    .arbre {
      position: absolute;
      bottom: 0;
      /* centré sur la jointure : left = 100% de la scène - moitié de l'arbre */
      left: 50%; /* mis à jour par JS */
      transform: translateX(-50%);
      height: 90%;
      width: auto;
      z-index: 50; /* au dessus des deux scènes */
      will-change: left;
      pointer-events: none;
    }

    /* ── Texte descente ─────────────────────────────────── */
    .altitude {
      position: absolute;
      top: 32px;
      left: 36px;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-style: italic;
      font-size: 1.1rem;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.12em;
      opacity: 0;
      transition: opacity 0.8s ease;
      pointer-events: none;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
      z-index: 200;
    }

    /* ── Indicateur scroll ──────────────────────────────── */
    .scroll-hint {
      position: absolute;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 1;
      transition: opacity 1s ease;
      z-index: 200;
    }

    .scroll-hint span {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: rgba(255,255,255,0.5);
      font-size: 0.85rem;
      letter-spacing: 0.2em;
    }

    .scroll-hint .fleche {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.5), transparent);
      animation: glisser 1.5s ease-in-out infinite;
    }

    .bouton_fleche {
      position: absolute;
      bottom: 5%;
      left: 5%;
      height: 40px;
      opacity: 0;
      transition: opacity 1s ease;
      cursor: pointer;
      z-index: 200;
    }

    @keyframes glisser {
      0%   { transform: scaleY(0); transform-origin: top; opacity: 1; }
      50%  { transform: scaleY(1); transform-origin: top; opacity: 1; }
      100% { transform: scaleY(1); transform-origin: top; opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="scene">
    <div class="calque-ciel"></div>

    <!-- Scène 2 : arrive depuis la gauche -->
    <div class="scene2">
      <div class="scene2-contenu">
        <p class="titre">Titre scène 2</p>
        <p class="description">Texte de la nouvelle scène</p>
      </div>
    </div>

    <!-- Groupe scène 1 : part vers la droite -->
    <div class="groupe-scene1">
      <div class="calque-ville">
        <img src="img/musee/colline_fourviere.png" alt="ville">
      </div>
      <img class="musee"   src="img/musee/003_musee_lugdunum.png"       alt="musée">
      <img class="ruines"  src="img/musee/002_ruines.png"               alt="ruines">
      <img class="ecolier" src="img/musee/001_ecolier_illustration.png" alt="écolier">

      <div class="bloc-texte-musee">
        <p class="titre">Musée de Lugdunum</p>
        <p class="description">Le musée de Lugdunum a été construit en 1789 après René Coty</p>
        <a href="https://www.grandlyon.com/metropole/missions-et-competences/education-culture-et-loisirs#section2" class="button">En savoir +</a>
      </div>
    </div>

    <!-- Arbre centré sur la jointure des deux scènes -->
    <img class="arbre" src="img/chantier/ARBRE.png" alt="arbre">

    <!-- UI permanente -->
    <p class="altitude" id="altitude">↓ &nbsp;en descente</p>
    <img class="bouton_fleche" src="img/fleche_haut.png" alt="flèche">
    <div class="scroll-hint" id="scrollHint">
      <span>scroller</span>
      <div class="fleche"></div>
    </div>
  </div>

  <script>
    const calqueVille   = document.querySelector('.calque-ville');
    const groupeScene1  = document.querySelector('.groupe-scene1');
    const musee         = document.querySelector('.musee');
    const ruines        = document.querySelector('.ruines');
    const ecolier       = document.querySelector('.ecolier');
    const blocTexte     = document.querySelector('.bloc-texte-musee');
    const scene2        = document.querySelector('.scene2');
    const scene2Contenu = document.querySelector('.scene2-contenu');
    const arbre         = document.querySelector('.arbre');
    const altitudeEl    = document.getElementById('altitude');
    const scrollHint    = document.getElementById('scrollHint');
    const arrowButton   = document.querySelector('.bouton_fleche');

    // ── Repères de scroll ──────────────────────────────────
    const scrollFin_descente  = 2000;
    const scrollDebut_musee   = 2200;
    const scrollDebut_ruines  = 2350;
    const scrollDebut_ecolier = 2500;
    const scrollDebut_glisse  = 4000; // début du glissement
    const scrollFin_glisse    = 4800; // scène 2 plein cadre
    // ──────────────────────────────────────────────────────

    function clamp(v, min, max) { return Math.min(Math.max(v, min), max); }
    function avancement(s, debut, fin) { return clamp((s - debut) / (fin - debut), 0, 1); }
    function toggle(el, condition) { el.classList.toggle('visible', condition); }

    arrowButton.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    window.addEventListener('scroll', () => {
      const s = window.scrollY;

      scrollHint.style.opacity  = s > 50 ? 0 : 1;
      arrowButton.style.opacity = s > 200 ? 1 : 0;
      altitudeEl.style.opacity  = s > 100 ? 1 : 0;

      // ── Descente ───────────────────────────────────────
      const pDescente = avancement(s, 0, scrollFin_descente);
      // La ville remonte depuis le bas (translateY de 100% à 0%)
      calqueVille.style.transform = `translateY(${(1 - pDescente) * 100}%)`;

      // ── Apparition des images ──────────────────────────
      toggle(musee,     s >= scrollDebut_musee);
      toggle(ruines,    s >= scrollDebut_ruines);
      toggle(ecolier,   s >= scrollDebut_ecolier);
      toggle(blocTexte, s >= scrollDebut_ecolier);

      // ── Glissement : scène1 part à droite, scène2 arrive de gauche ──
      const pGlisse    = avancement(s, scrollDebut_glisse, scrollFin_glisse);
      const deplacement = pGlisse * 100; // 0% → 100%

      // Scène 1 glisse vers la droite
      groupeScene1.style.transform = `translateX(${deplacement}%)`;

      // Scène 2 arrive depuis la gauche (-100% → 0%)
      scene2.style.left = `${-100 + deplacement}%`;

      // ── Arbre : suit la jointure entre les deux scènes ──
      // La jointure est au bord gauche de scène1 = deplacement% de la largeur
      // Au départ (pGlisse=0) : arbre centré à 50% (milieu de l'écran, caché si tu veux)
      // Pendant le glissement : arbre suit le bord gauche de scène1
      // L'arbre apparaît seulement quand on atteint 90% du glissement
      // et se positionne sur la jointure entre les deux scènes
      if (pGlisse >= 0.9) {
        arbre.style.display = 'block';
        arbre.style.left    = `${deplacement}%`;
      } else {
        arbre.style.display = 'none';
      }

      toggle(scene2Contenu, pGlisse >= 0.9);

    }, { passive: true });
  </script>
</body>
</html>
