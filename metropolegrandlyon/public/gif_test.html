<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 600vh; 
      background: #f32e2e;
    }

    .scene {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gif-frame {
      width: 80%;
      max-width: 600px;
    }
  </style>
</head>
<body>
  <div class="scene">
    <img class="gif-frame" src="img/gif/nuage2/frame_0001.png" alt="animation">
  </div>

  <script>
    const gifImage = document.querySelector('.gif-frame');
    const NOMBRE_FRAMES = 52;

    const frames = Array.from({ length: NOMBRE_FRAMES }, (_, i) => {
      const numero = String(i + 1).padStart(4, '0');
      return `img/gif/nuage2/frame_${numero}.png`;
    });

    frames.forEach(src => { const img = new Image(); img.src = src; });

    let frameAffichee = 0;

    window.addEventListener('scroll', () => {
      const scrollActuel = window.scrollY;
      const scrollMax    = document.body.scrollHeight - window.innerHeight;

      const progression  = scrollActuel / scrollMax;
      const indexFrame   = Math.min(
        Math.floor(progression * NOMBRE_FRAMES),
        NOMBRE_FRAMES - 1
      );

      // Ne redessine que si la frame a changé
      if (indexFrame !== frameAffichee) {
        gifImage.src  = frames[indexFrame];
        frameAffichee = indexFrame;
      }
    }, { passive: true });
  </script>
</body>
</html>
