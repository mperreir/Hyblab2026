<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Viewer 360° Interactif</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Écran de chargement ── -->
  <div id="loading">
    <div id="loading-text">Chargement de la scène 360°…</div>
    <div id="loading-bar-track"><div id="loading-bar"></div></div>
  </div>

  <!-- ── HUD ── -->
  <div id="hud">
    <h1>Salon Classique · 360°</h1>
  </div>

  <!-- ── Bouton calibration ── -->
  <button id="calib-toggle" title="Mode calibration">⊕ Calibrer</button>

  <!-- ── Hint ── -->
  <div id="hint">Glisser pour explorer · Cliquer sur un point pour l'article</div>

  <!-- ── Réticule de calibration ── -->
  <div id="calib-crosshair"></div>

  <!-- ── Panneau de calibration ── -->
  <div id="calib-panel">
    <h3>🎯 MODE CALIBRATION — Cliquez sur un objet pour placer un hotspot</h3>
    <div id="calib-coords">▶ Cliquez sur n'importe quel objet dans la scène.</div>
    <div id="calib-list"></div>
    <div id="calib-actions">
      <button class="calib-btn accent" id="calib-export">📋 Copier le code JS</button>
      <button class="calib-btn" id="calib-clear">🗑 Effacer tout</button>
      <button class="calib-btn" id="calib-close-btn">✕ Fermer</button>
    </div>
  </div>

  <!-- ── Popup article ── -->
  <div id="popup-overlay">
    <div id="popup">
      <div id="popup-close">×</div>
      <div id="popup-header">
        <div id="popup-category"></div>
        <div id="popup-title"></div>
      </div>
      <div id="popup-body">
        <div id="popup-description"></div>
        <div id="popup-specs"></div>
        <div id="popup-cta">
          <button class="btn-primary">En savoir plus</button>
          <button class="btn-secondary" id="btn-close-popup">Fermer</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Librairies ── -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <!-- ── Application ── -->
  <script src="main.js"></script>

</body>
</html>
